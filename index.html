<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block Blast">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#070d14">
<title>Block Blast</title>
<script>
(function(){
  var m={name:"Block Blast",short_name:"Block Blast",
    start_url:".",display:"fullscreen",
    background_color:"#070d14",theme_color:"#070d14",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23070d14'/%3E%3Crect x='24' y='24' width='60' height='60' rx='10' fill='%234f6ef7'/%3E%3Crect x='108' y='24' width='60' height='60' rx='10' fill='%23f87171'/%3E%3Crect x='24' y='108' width='60' height='60' rx='10' fill='%234ade80'/%3E%3Crect x='108' y='108' width='60' height='60' rx='10' fill='%23facc15'/%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]};
  var b=new Blob([JSON.stringify(m)],{type:"application/json"});
  var l=document.createElement("link");
  l.rel="manifest"; l.href=URL.createObjectURL(b);
  document.head.appendChild(l);
})();
</script>
<style>
/* ── Reset ── */
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; touch-action:none; }
body {
  background:linear-gradient(160deg,#0f1923 0%,#071018 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:-apple-system,'Helvetica Neue',sans-serif; color:#fff;
}

/* ── Header ── */
#header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:14px; }
.score-area { text-align:center; flex:1; }
.score-label { font-size:10px; color:#4f6ef7; font-weight:900; letter-spacing:2px; margin-bottom:2px; text-transform:uppercase; }
.score-val { font-size:42px; font-weight:900; color:#fff; line-height:1;
  text-shadow:0 0 30px rgba(79,110,247,0.6),0 2px 4px rgba(0,0,0,0.5); }
.best-area { text-align:center; flex:1; }
.best-label { font-size:10px; color:#f5a623; font-weight:900; letter-spacing:2px; margin-bottom:2px; }
.best-val { font-size:20px; font-weight:800; color:#f5a623; text-shadow:0 0 12px rgba(245,166,35,0.4); }
.combo-area { text-align:center; flex:1; min-height:46px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
.combo-label { font-size:10px; color:#e879f9; font-weight:900; letter-spacing:2px; margin-bottom:2px; }
.combo-val { font-size:20px; font-weight:900; color:#e879f9; line-height:1;
  text-shadow:0 0 12px rgba(232,121,249,0.5); display:none; }
@keyframes scoreBump { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(1)} }
.score-bump { animation:scoreBump 0.25s cubic-bezier(.34,1.56,.64,1); }
@keyframes comboPop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.combo-pop { animation:comboPop 0.2s cubic-bezier(.34,1.56,.64,1) forwards; }

/* ── Grid ── */
#grid-wrap {
  background:linear-gradient(145deg,#0d1824,#111e2e);
  border-radius:16px; padding:6px;
  box-shadow:0 0 0 1px rgba(79,110,247,0.15),0 0 60px rgba(0,0,0,0.8),inset 0 0 0 1px rgba(255,255,255,0.04);
  position:relative; z-index:1; overflow:hidden;
}
#grid { display:grid; gap:2px; position:relative; }

.cell {
  border-radius:5px;
  background:linear-gradient(145deg,#1a2535,#141e2c);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
  will-change:background,transform;
  transition:background 0.12s;
  position:relative; overflow:hidden;
}
.cell.filled {
  box-shadow:inset 0 4px 8px rgba(255,255,255,0.35),inset 0 -3px 6px rgba(0,0,0,0.4),0 2px 6px rgba(0,0,0,0.5);
}
.cell.filled::after {
  content:''; position:absolute; top:2px; left:3px; right:3px; height:35%;
  background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,transparent 100%);
  border-radius:3px; pointer-events:none;
}
.cell.filled::before {
  content:''; position:absolute; bottom:2px; left:3px; right:3px; height:20%;
  background:linear-gradient(0deg,rgba(0,0,0,0.25) 0%,transparent 100%);
  border-radius:3px; pointer-events:none;
}

/* ── Cell Animations ── */
@keyframes placePop { 0%{transform:scale(0.6)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
.placing { animation:placePop 0.22s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }

@keyframes cellClear { 0%{transform:scale(1);opacity:1} 35%{transform:scale(1.12);opacity:1} 100%{transform:scale(0);opacity:0} }
.clearing { animation:cellClear 0.28s ease-in forwards; z-index:10; }

/* ── Light Sweep ── */
.sweep {
  position:absolute; width:60%; height:100%; left:-60%; top:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.7),transparent);
  pointer-events:none; z-index:20; animation:sweepAnim 0.35s ease-out forwards;
}
@keyframes sweepAnim { 0%{left:-60%} 100%{left:110%} }
.sweep-col {
  position:absolute; width:100%; height:60%; top:-60%; left:0;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,0.7),transparent);
  pointer-events:none; z-index:20; animation:sweepColAnim 0.35s ease-out forwards;
}
@keyframes sweepColAnim { 0%{top:-60%} 100%{top:110%} }

/* ── Particles ── */
.particle {
  position:fixed; pointer-events:none; z-index:300; border-radius:50%;
  animation:particleFly 0.6s ease-out forwards;
}
@keyframes particleFly {
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}

/* ── Board Feedback ── */
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
}
.shake { animation:shake 0.3s ease; }
@keyframes boardFlash { 0%,100%{filter:brightness(1)} 40%{filter:brightness(2.5)} }
.board-flash { animation:boardFlash 0.45s ease; }

/* ── Tray ── */
#tray { display:flex; justify-content:space-around; align-items:center; margin-top:14px; height:100px; }
.block-slot {
  width:100px; height:100px; display:flex; align-items:center; justify-content:center;
  cursor:grab; transition:opacity 0.2s,transform 0.15s; border-radius:12px; position:relative;
}
.block-slot::before {
  content:''; position:absolute; inset:0; border-radius:12px;
  border:1px solid rgba(255,255,255,0.04); background:rgba(255,255,255,0.02);
}
.block-slot.dragging { opacity:0.08; transform:scale(0.78); }
.block-slot.used { opacity:0; pointer-events:none; }
.mini-grid { display:grid; gap:1.5px; }
.mini-cell { border-radius:3px; }
.mini-cell.filled {
  box-shadow:inset 0 2px 3px rgba(255,255,255,0.4),inset 0 -2px 3px rgba(0,0,0,0.3);
  position:relative;
}
.mini-cell.filled::after {
  content:''; position:absolute; top:1px; left:2px; right:2px; height:30%;
  background:rgba(255,255,255,0.45); border-radius:2px;
}

/* ── Drag Ghost（用 transform，硬體加速）── */
#drag-ghost {
  position:fixed; pointer-events:none; z-index:500; display:none;
  top:0; left:0;
  will-change:transform;
  /* drop-shadow 移除：會強制 composite 每幀重算，是拖曳延遲的元兇 */
}
.ghost-cell {
  border-radius:5px;
  box-shadow:inset 0 4px 8px rgba(255,255,255,0.4),inset 0 -4px 8px rgba(0,0,0,0.3);
  position:relative;
}
.ghost-cell::after {
  content:''; position:absolute; top:2px; left:3px; right:3px; height:35%;
  background:rgba(255,255,255,0.45); border-radius:3px;
}

/* ── FX Text ── */
.fx-text {
  position:absolute; pointer-events:none; z-index:100; text-align:center;
  animation:fxFloat 0.95s ease-out forwards;
}
@keyframes fxFloat {
  0%{transform:translate(-50%,0) scale(0.4);opacity:0;}
  15%{transform:translate(-50%,-24px) scale(1.25);opacity:1;}
  75%{transform:translate(-50%,-75px) scale(1);opacity:1;}
  100%{transform:translate(-50%,-105px) scale(0.85);opacity:0;}
}
.fx-score { font-size:28px; font-weight:900; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.8); }
.fx-msg { font-size:20px; font-weight:900;
  background:linear-gradient(180deg,#fff 0%,#818cf8 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.fx-combo { font-size:30px; font-weight:900; color:#f5a623; font-style:italic; text-shadow:0 0 16px rgba(245,166,35,0.7); }

/* ── All Clear ── */
#all-clear-overlay {
  position:absolute; inset:0; pointer-events:none; z-index:150;
  display:none; flex-direction:column; align-items:center; justify-content:center;
}
#all-clear-overlay::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle,rgba(56,189,248,0.2) 0%,transparent 70%);
}
@keyframes acPop { 0%{transform:scale(0.2) rotate(-10deg);opacity:0} 65%{transform:scale(1.18) rotate(2deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
.ac-title {
  font-size:44px; font-weight:900; letter-spacing:3px;
  background:linear-gradient(135deg,#38bdf8,#818cf8,#e879f9);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(56,189,248,0.6));
  animation:acPop 0.5s cubic-bezier(.34,1.56,.64,1);
}
.ac-pts { font-size:28px; font-weight:800; color:#fff; margin-top:4px;
  animation:acPop 0.6s cubic-bezier(.34,1.56,.64,1);
  text-shadow:0 0 20px rgba(255,255,255,0.5); }

/* ── Game Over ── */
#gameover {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.92);
  -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  z-index:999; display:none; flex-direction:column; align-items:center; justify-content:center;
}
@keyframes goIn { 0%{transform:scale(0.5) translateY(40px);opacity:0} 60%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
#go-box { text-align:center; animation:goIn 0.45s cubic-bezier(.34,1.56,.64,1); }
.go-label { font-size:11px; color:#64748b; font-weight:900; letter-spacing:2px; margin-bottom:6px; }
.go-title { font-size:44px; font-weight:900; margin-bottom:20px;
  background:linear-gradient(135deg,#f87171,#fb923c);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.go-score-val { font-size:72px; font-weight:900; color:#fff; line-height:1;
  text-shadow:0 0 40px rgba(79,110,247,0.5); margin-bottom:4px; }
.go-best { font-size:16px; color:#f5a623; font-weight:700; margin-bottom:40px; }
.btn-restart {
  background:linear-gradient(135deg,#4f6ef7,#818cf8); color:#fff;
  border:none; border-radius:50px; padding:16px 64px; font-size:20px; font-weight:900;
  cursor:pointer; box-shadow:0 8px 0 #3451c7,0 14px 28px rgba(79,110,247,0.4);
  transition:transform 0.1s,box-shadow 0.1s; letter-spacing:0.5px;
}
.btn-restart:active { transform:translateY(6px); box-shadow:0 2px 0 #3451c7,0 4px 8px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div id="header">
  <div class="score-area">
    <div class="score-label">SCORE</div>
    <div class="score-val" id="score-val">0</div>
  </div>
  <div class="combo-area">
    <div class="combo-label">COMBO</div>
    <div class="combo-val" id="combo-val">x1</div>
  </div>
  <div class="best-area">
    <div class="best-label">BEST</div>
    <div class="best-val" id="best-val">0</div>
  </div>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
  <div id="all-clear-overlay">
    <div class="ac-title">ALL CLEAR!</div>
    <div class="ac-pts">+500</div>
  </div>
</div>

<div id="tray"></div>
<div id="drag-ghost"></div>

<div id="gameover">
  <div id="go-box">
    <div class="go-label">GAME OVER</div>
    <div class="go-title">Final Score</div>
    <div class="go-score-val" id="go-score">0</div>
    <div class="go-best" id="go-best">Best: 0</div>
    <button class="btn-restart" onclick="resetGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   Constants & State
══════════════════════════════════════════════════ */
var GS=8, GAP=2, CS=40;
var grid, blocks, score, best, combo;
var dragging=-1, dragBlock=null, hoverR=null, hoverC=null;
var noClearStreak=0;
var rafId=null;
var isClearing=false; /* 消除動畫進行中：封鎖新的拖曳，防止事件被格子攔截導致拖不動 */

best=parseInt(localStorage.getItem("bb_best")||"0");
document.getElementById("best-val").textContent=best;

/* ══════════════════════════════════════════════════
   Responsive cell size
══════════════════════════════════════════════════ */
function calcCS(){
  var vw=window.innerWidth, vh=window.innerHeight;
  var availW=Math.min(vw-28,420);
  var fromW=Math.floor((availW-(GS-1)*GAP)/GS);
  var overhead=210;
  var fromH=Math.floor((vh-overhead-(GS-1)*GAP-12)/GS);
  CS=Math.max(28,Math.min(fromW,fromH,52));
}

/* ══════════════════════════════════════════════════
   Shape Library（27種）
══════════════════════════════════════════════════ */
var SHAPES=[
  {s:[[1]],c:"#3b82f6"},
  {s:[[1,1]],c:"#2dd4bf"},{s:[[1],[1]],c:"#2dd4bf"},
  {s:[[1,1,1]],c:"#4ade80"},{s:[[1],[1],[1]],c:"#4ade80"},
  {s:[[1,1,1,1]],c:"#facc15"},{s:[[1],[1],[1],[1]],c:"#facc15"},
  {s:[[1,1,1,1,1]],c:"#f87171"},{s:[[1],[1],[1],[1],[1]],c:"#f87171"},
  {s:[[1,1],[1,1]],c:"#a78bfa"},
  {s:[[1,1,1],[1,1,1],[1,1,1]],c:"#ec4899"},
  {s:[[1,1,1],[1,1,1]],c:"#fb923c"},{s:[[1,1],[1,1],[1,1]],c:"#fb923c"},
  {s:[[1,0],[1,1]],c:"#fb923c"},{s:[[0,1],[1,1]],c:"#fb923c"},
  {s:[[1,1],[1,0]],c:"#fb923c"},{s:[[1,1],[0,1]],c:"#fb923c"},
  {s:[[1,0,0],[1,0,0],[1,1,1]],c:"#fb923c"},{s:[[0,0,1],[0,0,1],[1,1,1]],c:"#fb923c"},
  {s:[[1,1,1],[1,0,0],[1,0,0]],c:"#fb923c"},{s:[[1,1,1],[0,0,1],[0,0,1]],c:"#fb923c"},
  {s:[[1,1,1],[0,1,0]],c:"#facc15"},{s:[[0,1,0],[1,1,1]],c:"#facc15"},
  {s:[[1,0],[1,1],[1,0]],c:"#facc15"},{s:[[0,1],[1,1],[0,1]],c:"#facc15"},
  {s:[[1,1,0],[0,1,1]],c:"#4ade80"},{s:[[0,1,1],[1,1,0]],c:"#4ade80"},
];
var SMALL_IDX=[], LINE_IDX=[3,4,5,6,7,8];
for(var _i=0;_i<SHAPES.length;_i++){
  var _sz=0;
  for(var _r=0;_r<SHAPES[_i].s.length;_r++)
    for(var _c=0;_c<SHAPES[_i].s[_r].length;_c++)
      if(SHAPES[_i].s[_r][_c])_sz++;
  if(_sz<=4)SMALL_IDX.push(_i);
}

/* ══════════════════════════════════════════════════
   Grid init（一次性建 DOM，後續只更新屬性）
══════════════════════════════════════════════════ */
function initGrid(){
  grid=[];
  for(var r=0;r<GS;r++){grid.push([]);for(var c=0;c<GS;c++)grid[r].push(null);}
  var el=document.getElementById("grid");
  el.innerHTML="";
  el.style.gridTemplateColumns="repeat("+GS+","+CS+"px)";
  el.style.gridTemplateRows="repeat("+GS+","+CS+"px)";
  el.style.gap=GAP+"px";
  for(var i=0;i<GS*GS;i++){
    var cell=document.createElement("div");
    cell.className="cell";
    cell.id="c"+Math.floor(i/GS)+"-"+(i%GS);
    cell.style.width=CS+"px";
    cell.style.height=CS+"px";
    el.appendChild(cell);
  }
  applyHeaderWidth();
}

/* 局部更新：只改有差異的格子，不碰 DOM 結構 */
function updateGridDisplay(){
  for(var r=0;r<GS;r++) for(var c=0;c<GS;c++){
    var cell=document.getElementById("c"+r+"-"+c);
    if(!cell)continue;
    if(grid[r][c]){
      if(!cell.classList.contains("filled")){
        cell.classList.add("filled");
        cell.style.background=grid[r][c];
      }
    } else {
      if(cell.classList.contains("filled")){
        cell.classList.remove("filled");
        cell.style.background="";
      }
    }
  }
}

function applyHeaderWidth(){
  var w=GS*CS+(GS-1)*GAP+12;
  document.getElementById("header").style.width=w+"px";
  document.getElementById("tray").style.width=w+"px";
}

/* ══════════════════════════════════════════════════
   Placement helpers
══════════════════════════════════════════════════ */
function canPlace(shape,row,col){
  for(var r=0;r<shape.length;r++) for(var c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    var nr=row+r,nc=col+c;
    if(nr<0||nr>=GS||nc<0||nc>=GS||grid[nr][nc])return false;
  }
  return true;
}
function canFitAnywhere(shape){
  for(var r=0;r<=GS-shape.length;r++)
    for(var c=0;c<=GS-shape[0].length;c++)
      if(canPlace(shape,r,c))return true;
  return false;
}
function checkGameOver(){
  for(var i=0;i<3;i++){
    if(!blocks[i])continue;
    if(canFitAnywhere(blocks[i].shape))return false;
  }
  return true;
}
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
}

/* ══════════════════════════════════════════════════
   盤面分析
══════════════════════════════════════════════════ */
function getNearFullLines(){
  var rows=[],cols=[];
  for(var r=0;r<GS;r++){
    var f=0; for(var c=0;c<GS;c++) if(grid[r][c])f++;
    var g=GS-f; if(g>0&&g<=5)rows.push({r:r,gap:g});
  }
  for(var c=0;c<GS;c++){
    var f=0; for(var r=0;r<GS;r++) if(grid[r][c])f++;
    var g=GS-f; if(g>0&&g<=5)cols.push({c:c,gap:g});
  }
  rows.sort(function(a,b){return a.gap-b.gap;});
  cols.sort(function(a,b){return a.gap-b.gap;});
  return{rows:rows,cols:cols};
}

function canCompleteAnyLine(shape,nearFull){
  // 橫向：shape能填滿某快滿行的所有空格（或填入部分，讓gap縮小）
  if(shape.length===1){
    for(var ri=0;ri<nearFull.rows.length;ri++){
      var tR=nearFull.rows[ri].r;
      var emptyCols=[];
      for(var c=0;c<GS;c++) if(!grid[tR][c])emptyCols.push(c);
      var w=shape[0].length;
      for(var sc=0;sc<=GS-w;sc++){
        // 至少覆蓋1個空格，且不壓到已填格
        var hits=0;
        var valid=true;
        for(var cc=0;cc<w;cc++){
          if(!shape[0][cc])continue;
          var col=sc+cc;
          if(col<0||col>=GS){valid=false;break;}
          if(grid[tR][col]){valid=false;break;} // 壓到已填格
          hits++;
        }
        if(valid&&hits>0&&canPlace(shape,tR,sc))return true;
      }
    }
  }
  // 縱向：shape能填入某快滿列的空格
  if(shape[0].length===1){
    for(var ci=0;ci<nearFull.cols.length;ci++){
      var tC=nearFull.cols[ci].c;
      var h=shape.length;
      for(var sr=0;sr<=GS-h;sr++){
        var hits=0;
        var valid=true;
        for(var rr=0;rr<h;rr++){
          if(!shape[rr][0])continue;
          var row=sr+rr;
          if(row<0||row>=GS){valid=false;break;}
          if(grid[row][tC]){valid=false;break;}
          hits++;
        }
        if(valid&&hits>0&&canPlace(shape,sr,tC))return true;
      }
    }
  }
  return false;
}

/* ══════════════════════════════════════════════════
   智慧生成（盤面感知 + Pity Timer）
══════════════════════════════════════════════════ */
function generateSmartBlocks(){
  var emptyCount=0;
  for(var r=0;r<GS;r++) for(var c=0;c<GS;c++) if(!grid[r][c])emptyCount++;
  var nearFull=getNearFullLines();
  var hasNearFull=nearFull.rows.length>0||nearFull.cols.length>0;
  var isPity=noClearStreak>=2;
  var result=[], guaranteedLine=false;

  for(var i=0;i<3;i++){
    var block=null, attempts=0;
    while(attempts<50){
      var idx, cand;

      // ① Pity：連續2組沒消行 → 強制長條
      if(isPity&&!guaranteedLine&&attempts<20){
        idx=LINE_IDX[Math.floor(Math.random()*LINE_IDX.length)];
        cand=SHAPES[idx];
        if(canFitAnywhere(cand.s)){
          block={shape:cand.s,color:cand.c};
          guaranteedLine=true; break;
        }
        attempts++; continue;
      }

      // ② 盤面感知：有快滿行列 → 55%機率給能填滿的長條
      if(hasNearFull&&!guaranteedLine&&Math.random()<0.55&&attempts<25){
        var pool=LINE_IDX.slice(); shuffle(pool);
        var found=false;
        for(var li=0;li<pool.length;li++){
          cand=SHAPES[pool[li]];
          if(canFitAnywhere(cand.s)&&canCompleteAnyLine(cand.s,nearFull)){
            block={shape:cand.s,color:cand.c};
            guaranteedLine=true; found=true; break;
          }
        }
        if(found)break;
      }

      // ③ 格子少 → 強制小方塊
      if(emptyCount<18&&attempts<20){
        idx=SMALL_IDX[Math.floor(Math.random()*SMALL_IDX.length)];
      } else {
        // ④ 一般隨機（65%小，35%全庫）
        idx=Math.random()<0.65
          ?SMALL_IDX[Math.floor(Math.random()*SMALL_IDX.length)]
          :Math.floor(Math.random()*SHAPES.length);
      }
      cand=SHAPES[idx];
      if(canFitAnywhere(cand.s)){block={shape:cand.s,color:cand.c};break;}
      attempts++;
    }
    if(!block)block={shape:SHAPES[0].s,color:SHAPES[0].c};
    result.push(block);
  }
  return result;
}

/* ══════════════════════════════════════════════════
   Tray render
══════════════════════════════════════════════════ */
function renderTray(){
  var tray=document.getElementById("tray");
  tray.innerHTML="";
  for(var i=0;i<3;i++){
    var slot=document.createElement("div");
    slot.className="block-slot"+(!blocks[i]?" used":"");
    slot.dataset.idx=i;
    if(blocks[i]){
      var b=blocks[i],rows=b.shape.length,cols=b.shape[0].length;
      var mcs=Math.min(22,Math.floor(84/Math.max(rows,cols)));
      var mg=document.createElement("div");
      mg.className="mini-grid";
      mg.style.gridTemplateColumns="repeat("+cols+","+mcs+"px)";
      mg.style.gridTemplateRows="repeat("+rows+","+mcs+"px)";
      mg.style.gap="1.5px";
      for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
        var bc=document.createElement("div");
        bc.className="mini-cell"+(b.shape[r][c]?" filled":"");
        bc.style.width=mcs+"px"; bc.style.height=mcs+"px";
        if(b.shape[r][c])bc.style.background=b.color;
        mg.appendChild(bc);
      }
      slot.appendChild(mg);
      (function(idx){
        slot.addEventListener("mousedown",function(e){e.preventDefault();startDrag(idx,e.clientX,e.clientY);});
        slot.addEventListener("touchstart",function(e){e.preventDefault();startDrag(idx,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
      })(i);
    }
    tray.appendChild(slot);
  }
}

/* ══════════════════════════════════════════════════
   Ghost（棋盤預覽）
══════════════════════════════════════════════════ */
var ghostIds=[];
function clearGhost(){
  ghostIds.forEach(function(id){
    var cell=document.getElementById(id);
    if(!cell)return;
    var p=id.replace("c","").split("-");
    var r=parseInt(p[0]),c=parseInt(p[1]);
    if(grid[r][c]){
      cell.classList.add("filled"); cell.style.background=grid[r][c];
    } else {
      cell.classList.remove("filled"); cell.style.background="";
    }
    cell.style.outline=""; cell.style.outlineOffset="";
  });
  ghostIds=[];
}
function renderGhost(){
  clearGhost();
  if(dragging<0||hoverR===null||!dragBlock)return;
  var valid=canPlace(dragBlock.shape,hoverR,hoverC);
  for(var r=0;r<dragBlock.shape.length;r++) for(var c=0;c<dragBlock.shape[r].length;c++){
    if(!dragBlock.shape[r][c])continue;
    var nr=hoverR+r,nc=hoverC+c;
    if(nr<0||nr>=GS||nc<0||nc>=GS)continue;
    var cell=document.getElementById("c"+nr+"-"+nc);
    if(!cell||grid[nr][nc])continue;
    ghostIds.push("c"+nr+"-"+nc);
    if(valid){
      cell.style.background=dragBlock.color+"80";
      cell.style.outline="2px solid "+dragBlock.color+"dd";
      cell.style.outlineOffset="-2px";
    } else {
      cell.style.background="rgba(248,113,113,0.22)";
      cell.style.outline="2px solid rgba(248,113,113,0.5)";
      cell.style.outlineOffset="-2px";
    }
  }
}

/* ══════════════════════════════════════════════════
   Drag（懸浮方塊 + rAF 節流）
══════════════════════════════════════════════════ */
function buildDragGhost(block){
  var ghost=document.getElementById("drag-ghost");
  ghost.innerHTML="";
  var rows=block.shape.length,cols=block.shape[0].length;
  var mg=document.createElement("div");
  mg.style.display="grid"; mg.style.gap=GAP+"px";
  mg.style.gridTemplateColumns="repeat("+cols+","+CS+"px)";
  mg.style.gridTemplateRows="repeat("+rows+","+CS+"px)";
  for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
    var bc=document.createElement("div");
    bc.style.width=CS+"px"; bc.style.height=CS+"px";
    if(block.shape[r][c]){
      bc.className="ghost-cell"; bc.style.background=block.color; bc.style.opacity="0.92";
    }
    mg.appendChild(bc);
  }
  ghost.appendChild(mg);
  ghost.style.display="block";
}

function moveDragGhost(cx,cy){
  if(!dragBlock)return;
  var cols=dragBlock.shape[0].length,rows=dragBlock.shape.length;
  var w=cols*CS+(cols-1)*GAP,h=rows*CS+(rows-1)*GAP;
  /* 用 transform 代替 left/top → GPU 合成層，不觸發 layout */
  document.getElementById("drag-ghost").style.transform=
    "translate3d("+(cx-w/2)+"px,"+(cy-h-56)+"px,0)";
}

function getGridAnchor(cx,cy){
  var rect=document.getElementById("grid").getBoundingClientRect();
  var cols=dragBlock.shape[0].length,rows=dragBlock.shape.length;
  var bw=cols*CS+(cols-1)*GAP, bh=rows*CS+(rows-1)*GAP;
  var rx=cx-rect.left-bw/2, ry=cy-rect.top-bh-56;
  return{row:Math.round(ry/(CS+GAP)),col:Math.round(rx/(CS+GAP))};
}

function startDrag(idx,cx,cy){
  if(!blocks[idx])return;
  if(isClearing)return; /* 消除動畫中不接受新拖曳 */
  dragging=idx; dragBlock=blocks[idx];
  var sl=document.querySelector(".block-slot[data-idx='"+idx+"']");
  if(sl)sl.classList.add("dragging");
  buildDragGhost(dragBlock);
  moveDragGhost(cx,cy);
  var a=getGridAnchor(cx,cy); hoverR=a.row; hoverC=a.col; renderGhost();
}

function onMove(cx,cy){
  if(dragging<0)return;
  if(rafId)cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(function(){
    moveDragGhost(cx,cy);
    var a=getGridAnchor(cx,cy);
    if(a.row!==hoverR||a.col!==hoverC){hoverR=a.row;hoverC=a.col;renderGhost();}
    rafId=null;
  });
}

window.addEventListener("mousemove",function(e){
  if(dragging<0)return;
  moveDragGhost(e.clientX,e.clientY);
  var a=getGridAnchor(e.clientX,e.clientY);
  if(a.row!==hoverR||a.col!==hoverC){hoverR=a.row;hoverC=a.col;renderGhost();}
});
window.addEventListener("touchmove",function(e){
  if(dragging<0)return;
  e.preventDefault();
  var t=e.touches[0];
  /* iOS：直接更新比 rAF 少一幀延遲，手指與方塊幾乎同步 */
  moveDragGhost(t.clientX,t.clientY);
  var a=getGridAnchor(t.clientX,t.clientY);
  if(a.row!==hoverR||a.col!==hoverC){hoverR=a.row;hoverC=a.col;renderGhost();}
},{passive:false});
window.addEventListener("mouseup",function(e){if(dragging>=0)drop(e.clientX,e.clientY);});
window.addEventListener("touchend",function(e){if(dragging>=0)drop(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});

/* ══════════════════════════════════════════════════
   Drop
══════════════════════════════════════════════════ */
function drop(cx,cy){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  document.getElementById("drag-ghost").style.display="none";
  var sl=document.querySelector(".block-slot[data-idx='"+dragging+"']");
  if(sl)sl.classList.remove("dragging");
  clearGhost();

  if(!canPlace(dragBlock.shape,hoverR,hoverC)){
    dragging=-1; dragBlock=null; hoverR=null; hoverC=null;
    var gw=document.getElementById("grid-wrap");
    gw.classList.add("shake"); setTimeout(function(){gw.classList.remove("shake");},320);
    return;
  }

  var savedR=hoverR,savedC=hoverC,savedShape=dragBlock.shape,savedColor=dragBlock.color;
  var bc=0;
  for(var r=0;r<dragBlock.shape.length;r++) for(var c=0;c<dragBlock.shape[r].length;c++){
    if(dragBlock.shape[r][c]){grid[savedR+r][savedC+c]=dragBlock.color;bc++;}
  }
  var idx=dragging;
  dragging=-1; dragBlock=null; hoverR=null; hoverC=null;

  updateGridDisplay();

  // 放置彈入動畫
  for(var r=0;r<savedShape.length;r++) for(var c=0;c<savedShape[r].length;c++){
    if(!savedShape[r][c])continue;
    var cell=document.getElementById("c"+(savedR+r)+"-"+(savedC+c));
    if(cell){
      cell.classList.add("placing");
      (function(cc){setTimeout(function(){cc.classList.remove("placing");},240);})(cell);
    }
  }

  score+=bc;
  updateScore(false);

  blocks[idx]=null;
  if(blocks.every(function(b){return b===null;}))blocks=generateSmartBlocks();
  renderTray();
  processClears(savedR,savedC);
}

/* ══════════════════════════════════════════════════
   Clear Lines
══════════════════════════════════════════════════ */
function processClears(dropR,dropC){
  var rc=[],cc=[];
  for(var r=0;r<GS;r++){
    var full=true;
    for(var c=0;c<GS;c++){if(!grid[r][c]){full=false;break;}}
    if(full)rc.push(r);
  }
  for(var c=0;c<GS;c++){
    var full=true;
    for(var r=0;r<GS;r++){if(!grid[r][c]){full=false;break;}}
    if(full)cc.push(c);
  }

  if(rc.length+cc.length===0){
    combo=0; noClearStreak++;
    updateComboDisplay();
    setTimeout(function(){if(checkGameOver())showGameOver();},50);
    return;
  }

  noClearStreak=0; combo++;
  isClearing=true; /* 開始消除動畫，封鎖拖曳 */

  // 分數：唯一格數 × 10 × (1 + combo×0.5)
  var fs={};
  for(var i=0;i<rc.length;i++) for(var c=0;c<GS;c++) fs["c"+rc[i]+"-"+c]=1;
  for(var i=0;i<cc.length;i++) for(var r=0;r<GS;r++) fs["c"+r+"-"+cc[i]]=1;
  var keys=Object.keys(fs);
  var clearScore=Math.round(keys.length*10*(1+combo*0.5));
  score+=clearScore;
  updateScore(true);
  updateComboDisplay();
  spawnFX(dropR,dropC,clearScore,combo,rc.length+cc.length);

  // 記錄消除格顏色
  var colorMap={};
  keys.forEach(function(id){
    var el=document.getElementById(id);
    if(el)colorMap[id]=el.style.background||"#38bdf8";
  });

  // 光掃
  var wrap=document.getElementById("grid-wrap");
  for(var i=0;i<rc.length;i++){
    (function(row){
      var sw=document.createElement("div"); sw.className="sweep";
      sw.style.top=(6+row*(CS+GAP))+"px"; sw.style.height=CS+"px";
      wrap.appendChild(sw);
      setTimeout(function(){if(sw.parentNode)sw.parentNode.removeChild(sw);},400);
    })(rc[i]);
  }
  for(var i=0;i<cc.length;i++){
    (function(col){
      var sw=document.createElement("div"); sw.className="sweep-col";
      sw.style.left=(6+col*(CS+GAP))+"px"; sw.style.width=CS+"px";
      wrap.appendChild(sw);
      setTimeout(function(){if(sw.parentNode)sw.parentNode.removeChild(sw);},400);
    })(cc[i]);
  }

  // 消除縮小動畫
  keys.forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    el.classList.add("clearing");
    var p=id.replace("c","").split("-");
    var dist=Math.abs(parseInt(p[0])-GS/2)+Math.abs(parseInt(p[1])-GS/2);
    el.style.animationDelay=(dist*0.012)+"s";
  });

  // 粒子
  setTimeout(function(){
    var groups={};
    keys.forEach(function(id){
      var col=colorMap[id]||"#38bdf8";
      if(!groups[col])groups[col]=[];
      groups[col].push(id);
    });
    Object.keys(groups).forEach(function(col){spawnParticles(groups[col],col);});
  },60);

  // 清格子 + 更新 DOM
  setTimeout(function(){
    for(var i=0;i<rc.length;i++) for(var c=0;c<GS;c++) grid[rc[i]][c]=null;
    for(var i=0;i<cc.length;i++) for(var r=0;r<GS;r++) grid[r][cc[i]]=null;
    keys.forEach(function(id){
      var el=document.getElementById(id);
      if(el){el.classList.remove("clearing");el.style.animationDelay="";}
    });
    updateGridDisplay();
    isClearing=false; /* 消除完成，解除封鎖 */

    // 全清
    var isEmpty=true;
    for(var r=0;r<GS&&isEmpty;r++) for(var c=0;c<GS&&isEmpty;c++) if(grid[r][c])isEmpty=false;
    if(isEmpty){score+=500;updateScore(true);showAllClear();}

    setTimeout(function(){if(checkGameOver())showGameOver();},60);
  },310);
}

/* ══════════════════════════════════════════════════
   Effects
══════════════════════════════════════════════════ */
function spawnParticles(cells,color){
  cells.forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    var rect=el.getBoundingClientRect();
    var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    for(var i=0;i<(5+Math.floor(Math.random()*4));i++){
      var p=document.createElement("div");
      p.className="particle";
      var sz=3+Math.random()*6;
      p.style.width=sz+"px"; p.style.height=sz+"px";
      p.style.background=color;
      p.style.boxShadow="0 0 6px "+color+",0 0 12px "+color+"80";
      var angle=Math.random()*Math.PI*2, dist=20+Math.random()*55;
      p.style.setProperty("--tx",Math.cos(angle)*dist+"px");
      p.style.setProperty("--ty",Math.sin(angle)*dist+"px");
      p.style.left=(cx-sz/2)+"px"; p.style.top=(cy-sz/2)+"px";
      p.style.animationDelay=(Math.random()*0.08)+"s";
      p.style.animationDuration=(0.4+Math.random()*0.25)+"s";
      document.body.appendChild(p);
      setTimeout(function(pp){if(pp.parentNode)pp.parentNode.removeChild(pp);},750,p);
    }
  });
}

function spawnFX(r,c,pts,cb,lines){
  var wrap=document.getElementById("grid-wrap");
  var div=document.createElement("div");
  div.className="fx-text";
  div.style.left=(c*(CS+GAP)+CS/2+6)+"px";
  div.style.top=(r*(CS+GAP)+CS/2+6)+"px";
  var msgs=["","","Good!","Great!","Excellent!","Amazing!","Perfect!","Legendary!"];
  var html="";
  if(cb>1) html+='<div class="fx-combo">COMBO '+cb+'×</div>';
  if(lines>=2) html+='<div class="fx-score">+'+pts+'</div><div class="fx-msg">'+(msgs[Math.min(lines,7)]||"Legendary!")+'</div>';
  else if(cb>1) html+='<div class="fx-score">+'+pts+'</div>';
  if(!html)return;
  div.innerHTML=html;
  wrap.appendChild(div);
  setTimeout(function(){if(div.parentNode)div.parentNode.removeChild(div);},950);
}

function showAllClear(){
  var o=document.getElementById("all-clear-overlay");
  o.style.display="flex";
  var gw=document.getElementById("grid-wrap");
  gw.classList.add("board-flash");
  setTimeout(function(){gw.classList.remove("board-flash");},470);
  setTimeout(function(){o.style.display="none";},1800);
}

function updateComboDisplay(){
  var cv=document.getElementById("combo-val");
  if(combo>1){
    cv.style.display="block";
    cv.textContent="×"+combo;
    cv.classList.remove("combo-pop"); void cv.offsetWidth; cv.classList.add("combo-pop");
  } else {
    cv.style.display="none";
  }
}

function updateScore(bump){
  document.getElementById("score-val").textContent=score;
  if(bump){
    var sv=document.getElementById("score-val");
    sv.classList.remove("score-bump"); void sv.offsetWidth; sv.classList.add("score-bump");
    setTimeout(function(){sv.classList.remove("score-bump");},280);
  }
  if(score>best){
    best=score; localStorage.setItem("bb_best",best);
    document.getElementById("best-val").textContent=best;
  }
}

function showGameOver(){
  document.getElementById("go-score").textContent=score;
  document.getElementById("go-best").textContent="Best: "+best;
  document.getElementById("gameover").style.display="flex";
}

/* ══════════════════════════════════════════════════
   Reset & Boot
══════════════════════════════════════════════════ */
function resetGame(){
  document.getElementById("gameover").style.display="none";
  score=0; combo=0; noClearStreak=0;
  document.getElementById("score-val").textContent=0;
  document.getElementById("combo-val").style.display="none";
  calcCS(); initGrid();
  blocks=generateSmartBlocks();
  renderTray();
}

window.addEventListener("DOMContentLoaded",function(){calcCS();resetGame();});
window.addEventListener("resize",function(){
  calcCS();
  var el=document.getElementById("grid");
  el.style.gridTemplateColumns="repeat("+GS+","+CS+"px)";
  el.style.gridTemplateRows="repeat("+GS+","+CS+"px)";
  for(var i=0;i<GS*GS;i++){
    var r=Math.floor(i/GS),c=i%GS;
    var cell=document.getElementById("c"+r+"-"+c);
    if(cell){cell.style.width=CS+"px";cell.style.height=CS+"px";}
  }
  applyHeaderWidth(); renderTray();
});
</script>
