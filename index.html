<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block Blast">
<meta name="mobile-web-app-capable" content="yes">
<title>Block Blast</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; }
body {
  background:linear-gradient(160deg,#1a2a44 0%,#0d1220 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
}

/* ── Header ── */
#header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:14px; }
.score-area { text-align:center; flex:1; }
.score-label { font-size:11px; color:#6366f1; font-weight:800; letter-spacing:1.5px; margin-bottom:2px; }
.score-val { font-size:40px; font-weight:900; color:#fff; line-height:1; text-shadow:0 0 20px rgba(99,102,241,0.5); }
.best-area { text-align:center; flex:1; }
.best-label { font-size:11px; color:#fbbf24; font-weight:800; letter-spacing:1.5px; margin-bottom:2px; }
.best-val { font-size:20px; font-weight:800; color:#fbbf24; }

@keyframes scoreBump { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }
.score-bump { animation:scoreBump 0.22s cubic-bezier(.34,1.56,.64,1); }

/* ── Grid ── */
#grid-wrap {
  background:#111827; border-radius:12px; padding:6px;
  box-shadow:0 0 40px rgba(0,0,0,0.7),inset 0 0 0 2px rgba(255,255,255,0.05);
  position:relative; z-index:1; overflow:hidden;
}
#grid { display:grid; gap:2px; position:relative; }
.cell { border-radius:4px; background:#1f2937; position:relative; overflow:hidden; }

/* Jelly effect */
.cell.filled {
  box-shadow:inset 0 4px 6px rgba(255,255,255,0.4),inset 0 -4px 6px rgba(0,0,0,0.3),0 2px 4px rgba(0,0,0,0.4);
}
.cell.filled::after {
  content:''; position:absolute; top:2px; left:2px; right:2px; height:32%;
  background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,transparent 100%);
  border-radius:2px; pointer-events:none;
}

/* Place bounce */
@keyframes placePop { 0%{transform:scale(0.75)} 55%{transform:scale(1.12)} 100%{transform:scale(1)} }
.placing { animation:placePop 0.22s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }

/* Clear: scale to 0 */
@keyframes cellClear { 0%{transform:scale(1);opacity:1} 40%{transform:scale(1.12);opacity:1} 100%{transform:scale(0);opacity:0} }
.clearing { animation:cellClear 0.3s ease-in forwards; z-index:10; }

/* Line sweep */
.sweep {
  position:absolute; width:55%; height:100%; left:-55%; top:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.65),transparent);
  pointer-events:none; z-index:20;
  animation:sweepAnim 0.38s ease-out forwards;
}
@keyframes sweepAnim { 0%{left:-55%} 100%{left:110%} }

/* Particles */
.particle {
  position:fixed; pointer-events:none; z-index:300; border-radius:50%;
  animation:particleFly 0.58s ease-out forwards;
}
@keyframes particleFly {
  0%  {transform:translate(0,0) scale(1); opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0); opacity:0;}
}

/* Shake */
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
}
.shake { animation:shake 0.32s ease; }

/* Board flash */
@keyframes boardFlash { 0%,100%{opacity:1} 35%{opacity:0.08} }
.board-flash { animation:boardFlash 0.4s ease; }

/* ── Tray ── */
#tray { display:flex; justify-content:space-around; align-items:center; margin-top:16px; height:96px; }
.block-slot {
  width:96px; height:96px; display:flex; align-items:center; justify-content:center;
  cursor:grab; transition:opacity 0.2s,transform 0.12s; border-radius:10px;
}
.block-slot.dragging { opacity:0.1; transform:scale(0.82); }
.block-slot.used { opacity:0; pointer-events:none; }
.mini-grid { display:grid; gap:1.5px; }
.mini-cell { border-radius:2px; }
.mini-cell.filled { box-shadow:inset 0 2px 3px rgba(255,255,255,0.4),inset 0 -2px 3px rgba(0,0,0,0.3); }

/* Drag ghost */
#drag-ghost {
  position:fixed; pointer-events:none; z-index:500; display:none;
  filter:drop-shadow(0 12px 24px rgba(0,0,0,0.6));
}
.ghost-cell {
  border-radius:4px;
  box-shadow:inset 0 4px 6px rgba(255,255,255,0.4),inset 0 -4px 6px rgba(0,0,0,0.3);
}

/* FX text */
.fx-text {
  position:absolute; pointer-events:none; z-index:100; text-align:center;
  animation:fxFloat 0.9s ease-out forwards;
}
@keyframes fxFloat {
  0%  {transform:translate(-50%,0) scale(0.5); opacity:0;}
  18% {transform:translate(-50%,-30px) scale(1.2); opacity:1;}
  80% {transform:translate(-50%,-80px) scale(1); opacity:1;}
  100%{transform:translate(-50%,-110px) scale(0.8); opacity:0;}
}
.fx-score { font-size:26px; font-weight:900; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.7); }
.fx-msg { font-size:22px; font-weight:900; background:linear-gradient(180deg,#fff,#a5b4fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.fx-combo { font-size:28px; font-weight:900; color:#fbbf24; font-style:italic; text-shadow:0 0 12px #f59e0b; }

/* All Clear */
#all-clear-overlay {
  position:absolute; inset:0; pointer-events:none; z-index:150;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.15);
}
@keyframes acPop { 0%{transform:scale(0.3);opacity:0} 65%{transform:scale(1.15);opacity:1} 100%{transform:scale(1);opacity:1} }
.ac-title { font-size:40px; font-weight:900; color:#38bdf8; text-shadow:0 0 30px #0284c7,0 0 60px #0284c7; animation:acPop 0.5s ease-out; letter-spacing:2px; }
.ac-pts { font-size:26px; font-weight:800; color:#fff; margin-top:6px; animation:acPop 0.6s ease-out; }

/* Game over */
#gameover {
  position:fixed; inset:0; background:rgba(0,0,0,0.88);
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
  z-index:999; display:none; flex-direction:column; align-items:center; justify-content:center;
}
@keyframes goIn { 0%{transform:scale(0.6);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
#go-box { text-align:center; animation:goIn 0.4s cubic-bezier(.34,1.56,.64,1); }
.go-title { font-size:40px; font-weight:900; color:#38bdf8; margin-bottom:12px; }
.go-score-val { font-size:68px; font-weight:900; color:#fff; margin-bottom:8px; line-height:1; }
.go-best { font-size:18px; color:#fbbf24; font-weight:700; margin-bottom:36px; }
.btn-restart {
  background:#6366f1; color:#fff; border:none; border-radius:50px;
  padding:15px 60px; font-size:22px; font-weight:800; cursor:pointer;
  box-shadow:0 8px 0 #4338ca,0 12px 24px rgba(0,0,0,0.4);
  transition:transform 0.1s,box-shadow 0.1s;
}
.btn-restart:active { transform:translateY(6px); box-shadow:0 2px 0 #4338ca; }
</style>
</head>
<body>

<div id="header">
  <div class="score-area">
    <div class="score-label">SCORE</div>
    <div class="score-val" id="score-val">0</div>
  </div>
  <div class="best-area">
    <div class="best-label">BEST</div>
    <div class="best-val" id="best-val">0</div>
  </div>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
  <div id="all-clear-overlay">
    <div class="ac-title">ALL CLEAR!</div>
    <div class="ac-pts">+500</div>
  </div>
</div>

<div id="tray"></div>
<div id="drag-ghost"></div>

<div id="gameover">
  <div id="go-box">
    <div class="go-title">Game Over</div>
    <div class="go-score-val" id="go-score">0</div>
    <div class="go-best" id="go-best">Best: 0</div>
    <button class="btn-restart" onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
var GS=8, GAP=2, CS=40;

// ── Responsive ─────────────────────────────────────────────────────────────────
function calcCS(){
  var vw=window.innerWidth, vh=window.innerHeight;
  var availW=Math.min(vw-32,400);
  var fromW=Math.floor((availW-(GS-1)*GAP)/GS);
  var overhead=200;
  var fromH=Math.floor((vh-overhead-(GS-1)*GAP-12)/GS);
  CS=Math.max(28,Math.min(fromW,fromH,50));
}

// ── Shapes (fixed color per shape type) ───────────────────────────────────────
var SHAPES=[
  {s:[[1]],                          c:"#3b82f6"},
  {s:[[1,1]],                        c:"#2dd4bf"},
  {s:[[1],[1]],                      c:"#2dd4bf"},
  {s:[[1,1,1]],                      c:"#4ade80"},
  {s:[[1],[1],[1]],                  c:"#4ade80"},
  {s:[[1,1,1,1]],                    c:"#facc15"},
  {s:[[1],[1],[1],[1]],              c:"#facc15"},
  {s:[[1,1,1,1,1]],                  c:"#f87171"},
  {s:[[1],[1],[1],[1],[1]],          c:"#f87171"},
  {s:[[1,1],[1,1]],                  c:"#a78bfa"},
  {s:[[1,1,1],[1,1,1],[1,1,1]],      c:"#ec4899"},
  {s:[[1,0],[1,1]],                  c:"#fb923c"},
  {s:[[0,1],[1,1]],                  c:"#fb923c"},
  {s:[[1,1],[1,0]],                  c:"#fb923c"},
  {s:[[1,1],[0,1]],                  c:"#fb923c"},
  {s:[[1,0,0],[1,0,0],[1,1,1]],      c:"#fb923c"},
  {s:[[0,0,1],[0,0,1],[1,1,1]],      c:"#fb923c"},
  {s:[[1,1,1],[1,0,0],[1,0,0]],      c:"#fb923c"},
  {s:[[1,1,1],[0,0,1],[0,0,1]],      c:"#fb923c"},
];

// Shape sizes for smart gen
function shapeSize(s){ var n=0; for(var r=0;r<s.length;r++) for(var c=0;c<s[r].length;c++) if(s[r][c])n++; return n; }

// ── Smart block generation (Gemini algorithm) ─────────────────────────────────
function canFitAnywhere(shape){
  for(var r=0;r<=GS-shape.length;r++) for(var c=0;c<=GS-shape[0].length;c++) if(canPlace(shape,r,c))return true;
  return false;
}

function generateSmartBlocks(){
  var emptyCount=0;
  for(var r=0;r<GS;r++) for(var c=0;c<GS;c++) if(!grid[r][c])emptyCount++;

  // Difficulty: higher score = more large blocks
  var largeBias=Math.min(0.5, score/5000); // 0 at start, 0.5 at 5000pts

  var result=[];
  for(var i=0;i<3;i++){
    var block=null, attempts=0;
    while(attempts<25){
      var idx=Math.floor(Math.random()*SHAPES.length);
      var candidate=SHAPES[idx];
      var size=shapeSize(candidate.s);
      var isLarge=size>4;

      // Survival: if board very full, avoid large blocks
      if(emptyCount<15&&isLarge&&attempts<18){ attempts++; continue; }

      // Difficulty curve: at high scores, occasionally force large blocks
      if(isLarge&&Math.random()>0.3+largeBias&&attempts<15){ attempts++; continue; }

      // Must fit somewhere on current board
      if(canFitAnywhere(candidate.s)){
        block={shape:candidate.s, color:candidate.c};
        break;
      }
      attempts++;
    }
    // Fallback: 1x1
    if(!block) block={shape:SHAPES[0].s, color:SHAPES[0].c};
    result.push(block);
  }
  return result;
}

// ── State ──────────────────────────────────────────────────────────────────────
var grid,blocks,score,best,combo;
var dragging=-1,dragBlock=null,hoverR=null,hoverC=null;
best=parseInt(localStorage.getItem("bb_best")||"0");
document.getElementById("best-val").textContent=best;

function initGrid(){
  grid=[];
  for(var r=0;r<GS;r++){grid.push([]);for(var c=0;c<GS;c++)grid[r].push(null);}
}
function canPlace(shape,row,col){
  for(var r=0;r<shape.length;r++) for(var c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    var nr=row+r,nc=col+c;
    if(nr<0||nr>=GS||nc<0||nc>=GS||grid[nr][nc])return false;
  }
  return true;
}
function checkGameOver(){
  for(var i=0;i<3;i++){
    if(!blocks[i])continue;
    if(canFitAnywhere(blocks[i].shape))return false;
  }
  return true;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function applySize(){
  var totalW=GS*CS+(GS-1)*GAP+12;
  document.getElementById("header").style.width=totalW+"px";
  document.getElementById("tray").style.width=totalW+"px";
}
function renderGrid(){
  var el=document.getElementById("grid");
  el.innerHTML="";
  el.style.gridTemplateColumns="repeat("+GS+","+CS+"px)";
  el.style.gridTemplateRows="repeat("+GS+","+CS+"px)";
  applySize();
  for(var r=0;r<GS;r++) for(var c=0;c<GS;c++){
    var cell=document.createElement("div");
    cell.className="cell"+(grid[r][c]?" filled":"");
    cell.id="c"+r+"-"+c;
    cell.style.width=CS+"px"; cell.style.height=CS+"px";
    if(grid[r][c]) cell.style.background=grid[r][c];
    el.appendChild(cell);
  }
}
function renderTray(){
  var tray=document.getElementById("tray");
  tray.innerHTML="";
  for(var i=0;i<3;i++){
    var slot=document.createElement("div");
    slot.className="block-slot"+(!blocks[i]?" used":"");
    slot.dataset.idx=i;
    if(blocks[i]){
      var b=blocks[i],rows=b.shape.length,cols=b.shape[0].length;
      var mcs=Math.min(22,Math.floor(82/Math.max(rows,cols)));
      var mg=document.createElement("div");
      mg.className="mini-grid";
      mg.style.gridTemplateColumns="repeat("+cols+","+mcs+"px)";
      mg.style.gridTemplateRows="repeat("+rows+","+mcs+"px)";
      mg.style.gap="1.5px";
      for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
        var bc=document.createElement("div");
        bc.className="mini-cell"+(b.shape[r][c]?" filled":"");
        bc.style.width=mcs+"px"; bc.style.height=mcs+"px";
        if(b.shape[r][c]) bc.style.background=b.color;
        mg.appendChild(bc);
      }
      slot.appendChild(mg);
      (function(idx){
        slot.addEventListener("mousedown",function(e){startDrag(idx,e.clientX,e.clientY);});
        slot.addEventListener("touchstart",function(e){e.preventDefault();startDrag(idx,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
      })(i);
    }
    tray.appendChild(slot);
  }
}

// ── Ghost ──────────────────────────────────────────────────────────────────────
var ghostIds=[];
function clearGhost(){
  ghostIds.forEach(function(id){
    var cell=document.getElementById(id);
    if(!cell)return;
    var parts=id.replace("c","").split("-");
    var r=parseInt(parts[0]),c=parseInt(parts[1]);
    cell.style.background=grid[r][c]?grid[r][c]:"";
    cell.style.outline="";
  });
  ghostIds=[];
}
function renderGhost(){
  clearGhost();
  if(dragging<0||hoverR===null||!dragBlock)return;
  var valid=canPlace(dragBlock.shape,hoverR,hoverC);
  for(var r=0;r<dragBlock.shape.length;r++) for(var c=0;c<dragBlock.shape[r].length;c++){
    if(!dragBlock.shape[r][c])continue;
    var nr=hoverR+r,nc=hoverC+c;
    if(nr<0||nr>=GS||nc<0||nc>=GS)continue;
    var cell=document.getElementById("c"+nr+"-"+nc);
    if(!cell||grid[nr][nc])continue;
    ghostIds.push("c"+nr+"-"+nc);
    if(valid){
      cell.style.background=dragBlock.color+"75";
      cell.style.outline="2px solid "+dragBlock.color+"cc";
      cell.style.outlineOffset="-2px";
    } else {
      cell.style.background="rgba(239,68,68,0.25)";
      cell.style.outline="2px solid rgba(239,68,68,0.5)";
      cell.style.outlineOffset="-2px";
    }
  }
}

// ── Drag ───────────────────────────────────────────────────────────────────────
function buildGhost(block){
  var ghost=document.getElementById("drag-ghost");
  ghost.innerHTML="";
  var rows=block.shape.length,cols=block.shape[0].length;
  var mg=document.createElement("div");
  mg.style.display="grid"; mg.style.gap=GAP+"px";
  mg.style.gridTemplateColumns="repeat("+cols+","+CS+"px)";
  mg.style.gridTemplateRows="repeat("+rows+","+CS+"px)";
  for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
    var bc=document.createElement("div");
    bc.style.width=CS+"px"; bc.style.height=CS+"px";
    if(block.shape[r][c]){
      bc.className="ghost-cell";
      bc.style.background=block.color;
    }
    mg.appendChild(bc);
  }
  ghost.appendChild(mg);
  ghost.style.display="block";
}
function posGhost(cx,cy){
  if(!dragBlock)return;
  var cols=dragBlock.shape[0].length,rows=dragBlock.shape.length;
  var w=cols*CS+(cols-1)*GAP,h=rows*CS+(rows-1)*GAP;
  var g=document.getElementById("drag-ghost");
  g.style.left=(cx-w/2)+"px";
  g.style.top=(cy-h-50)+"px";
}
function getAnchor(cx,cy){
  var rect=document.getElementById("grid").getBoundingClientRect();
  var cols=dragBlock.shape[0].length,rows=dragBlock.shape.length;
  var bw=cols*CS+(cols-1)*GAP,bh=rows*CS+(rows-1)*GAP;
  var rx=cx-rect.left-bw/2, ry=cy-rect.top-bh-50;
  return{row:Math.round(ry/(CS+GAP)),col:Math.round(rx/(CS+GAP))};
}
function startDrag(idx,cx,cy){
  if(!blocks[idx])return;
  dragging=idx; dragBlock=blocks[idx];
  var sl=document.querySelector(".block-slot[data-idx='"+idx+"']");
  if(sl)sl.classList.add("dragging");
  buildGhost(dragBlock); posGhost(cx,cy);
  var a=getAnchor(cx,cy); hoverR=a.row; hoverC=a.col; renderGhost();
}
window.addEventListener("mousemove",function(e){
  if(dragging<0)return;
  posGhost(e.clientX,e.clientY);
  var a=getAnchor(e.clientX,e.clientY); hoverR=a.row; hoverC=a.col; renderGhost();
});
window.addEventListener("touchmove",function(e){
  if(dragging<0)return; e.preventDefault();
  var t=e.touches[0];
  posGhost(t.clientX,t.clientY);
  var a=getAnchor(t.clientX,t.clientY); hoverR=a.row; hoverC=a.col; renderGhost();
},{passive:false});
window.addEventListener("mouseup",function(e){if(dragging>=0)drop(e.clientX,e.clientY);});
window.addEventListener("touchend",function(e){if(dragging>=0)drop(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});

// ── Drop ───────────────────────────────────────────────────────────────────────
function drop(cx,cy){
  document.getElementById("drag-ghost").style.display="none";
  var sl=document.querySelector(".block-slot[data-idx='"+dragging+"']");
  if(sl)sl.classList.remove("dragging");
  clearGhost();

  if(!canPlace(dragBlock.shape,hoverR,hoverC)){
    dragging=-1; dragBlock=null; hoverR=null; hoverC=null;
    var w=document.getElementById("grid-wrap");
    w.classList.add("shake"); setTimeout(function(){w.classList.remove("shake");},350);
    return;
  }

  var bc=0, savedR=hoverR, savedC=hoverC;
  var savedShape=dragBlock.shape, savedColor=dragBlock.color;
  for(var r=0;r<dragBlock.shape.length;r++) for(var c=0;c<dragBlock.shape[r].length;c++){
    if(dragBlock.shape[r][c]){ grid[savedR+r][savedC+c]=dragBlock.color; bc++; }
  }
  var idx=dragging;
  dragging=-1; dragBlock=null; hoverR=null; hoverC=null;

  renderGrid();
  // bounce anim on placed cells
  for(var r=0;r<savedShape.length;r++) for(var c=0;c<savedShape[r].length;c++){
    if(!savedShape[r][c])continue;
    var cell=document.getElementById("c"+(savedR+r)+"-"+(savedC+c));
    if(cell){
      cell.classList.add("placing");
      (function(cc){setTimeout(function(){cc.classList.remove("placing");},230);})(cell);
    }
  }

  score+=bc; // 1pt per cell
  updateScore(false);

  blocks[idx]=null;
  if(blocks.every(function(b){return b===null;}))
    blocks=generateSmartBlocks();
  renderTray();

  processClears(savedR,savedC);
}

// ── Clear Lines ────────────────────────────────────────────────────────────────
function processClears(dropR,dropC){
  var rc=[],cc=[];
  for(var r=0;r<GS;r++){
    var full=true;
    for(var c=0;c<GS;c++){if(!grid[r][c]){full=false;break;}}
    if(full)rc.push(r);
  }
  for(var c=0;c<GS;c++){
    var full=true;
    for(var r=0;r<GS;r++){if(!grid[r][c]){full=false;break;}}
    if(full)cc.push(c);
  }

  var lines=rc.length+cc.length;
  if(lines===0){ combo=0; setTimeout(function(){if(checkGameOver())showGameOver();},50); return; }

  combo++;

  // Score: unique cleared cells × 10 × combo
  var fs={};
  for(var i=0;i<rc.length;i++) for(var c=0;c<GS;c++) fs["c"+rc[i]+"-"+c]=1;
  for(var i=0;i<cc.length;i++) for(var r=0;r<GS;r++) fs["c"+r+"-"+cc[i]]=1;
  var keys=Object.keys(fs);
  var clearScore=keys.length*10*combo;
  score+=clearScore;
  updateScore(true);

  spawnFX(dropR,dropC,clearScore,combo,lines);

  // Save colors for particles
  var colorMap={};
  keys.forEach(function(id){
    var el=document.getElementById(id);
    if(el) colorMap[id]=el.style.background||"#38bdf8";
  });

  // Sweep per row
  var wrap=document.getElementById("grid-wrap");
  for(var i=0;i<rc.length;i++){
    (function(row){
      var sw=document.createElement("div");
      sw.className="sweep";
      sw.style.top=(6+row*(CS+GAP))+"px";
      sw.style.height=CS+"px";
      wrap.appendChild(sw);
      setTimeout(function(){if(sw.parentNode)sw.parentNode.removeChild(sw);},420);
    })(rc[i]);
  }

  // Clear animation
  keys.forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    el.classList.add("clearing");
    var parts=id.replace("c","").split("-");
    var dist=Math.abs(parseInt(parts[0])-GS/2)+Math.abs(parseInt(parts[1])-GS/2);
    el.style.animationDelay=(dist*0.015)+"s";
  });

  // Particles
  setTimeout(function(){
    var groups={};
    keys.forEach(function(id){
      var col=colorMap[id]||"#38bdf8";
      if(!groups[col])groups[col]=[];
      groups[col].push(id);
    });
    Object.keys(groups).forEach(function(col){ spawnParticles(groups[col],col); });
  },75);

  // Apply + check all clear
  setTimeout(function(){
    for(var i=0;i<rc.length;i++) for(var c=0;c<GS;c++) grid[rc[i]][c]=null;
    for(var i=0;i<cc.length;i++) for(var r=0;r<GS;r++) grid[r][cc[i]]=null;

    var isEmpty=true;
    for(var r=0;r<GS&&isEmpty;r++) for(var c=0;c<GS&&isEmpty;c++) if(grid[r][c])isEmpty=false;
    renderGrid();

    if(isEmpty){
      score+=500;
      updateScore(true);
      showAllClear();
    }

    setTimeout(function(){if(checkGameOver())showGameOver();},60);
  },330);
}

// ── Effects ────────────────────────────────────────────────────────────────────
function spawnParticles(cells,color){
  cells.forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    var rect=el.getBoundingClientRect();
    var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    for(var i=0;i<6;i++){
      var p=document.createElement("div");
      p.className="particle";
      var sz=4+Math.random()*5;
      p.style.width=sz+"px"; p.style.height=sz+"px";
      p.style.background=color; p.style.boxShadow="0 0 5px "+color;
      var angle=Math.random()*Math.PI*2,dist=22+Math.random()*50;
      p.style.setProperty("--tx",Math.cos(angle)*dist+"px");
      p.style.setProperty("--ty",Math.sin(angle)*dist+"px");
      p.style.left=(cx-sz/2)+"px"; p.style.top=(cy-sz/2)+"px";
      p.style.animationDelay=(Math.random()*0.07)+"s";
      p.style.animationDuration=(0.45+Math.random()*0.2)+"s";
      document.body.appendChild(p);
      setTimeout(function(pp){if(pp.parentNode)pp.parentNode.removeChild(pp);},700,p);
    }
  });
}

function spawnFX(r,c,pts,cb,lines){
  var wrap=document.getElementById("grid-wrap");
  var px=(c*(CS+GAP))+CS/2+6;
  var py=(r*(CS+GAP))+CS/2+6;
  var div=document.createElement("div");
  div.className="fx-text";
  div.style.left=px+"px"; div.style.top=py+"px";
  var msgs=["","","Good!","Great!","Excellent!","Amazing!","Perfect!"];
  var html="";
  if(cb>1) html+='<div class="fx-combo">COMBO '+cb+'x</div>';
  if(lines>=2) html+='<div class="fx-score">+'+pts+'</div><div class="fx-msg">'+(msgs[Math.min(lines,6)]||"Perfect!")+'</div>';
  else if(cb>1) html+='<div class="fx-score">+'+pts+'</div>';
  if(!html)return;
  div.innerHTML=html;
  wrap.appendChild(div);
  setTimeout(function(){if(div.parentNode)div.parentNode.removeChild(div);},900);
}

function showAllClear(){
  var o=document.getElementById("all-clear-overlay");
  o.style.display="flex";
  var gw=document.getElementById("grid-wrap");
  gw.classList.add("board-flash");
  setTimeout(function(){gw.classList.remove("board-flash");},420);
  setTimeout(function(){o.style.display="none";},1600);
}

function updateScore(bump){
  document.getElementById("score-val").textContent=score;
  if(bump){
    var sv=document.getElementById("score-val");
    sv.classList.remove("score-bump"); void sv.offsetWidth; sv.classList.add("score-bump");
    setTimeout(function(){sv.classList.remove("score-bump");},260);
  }
  if(score>best){
    best=score; localStorage.setItem("bb_best",best);
    document.getElementById("best-val").textContent=best;
  }
}

function showGameOver(){
  document.getElementById("go-score").textContent=score;
  document.getElementById("go-best").textContent="Best: "+best;
  document.getElementById("gameover").style.display="flex";
}
function resetGame(){
  document.getElementById("gameover").style.display="none";
  score=0; combo=0;
  document.getElementById("score-val").textContent=0;
  initGrid();
  blocks=generateSmartBlocks();
  renderGrid(); renderTray();
}

window.addEventListener("DOMContentLoaded",function(){calcCS();resetGame();});
window.addEventListener("resize",function(){calcCS();renderGrid();renderTray();});
</script>
