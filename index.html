<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: sans-serif; overflow: hidden;
}
#title { font-size: 28px; font-weight: 900; color: #FFD700; letter-spacing: 2px; text-shadow: 0 0 20px #FFD700; margin-bottom: 10px; }
#scores { display: flex; gap: 20px; margin-bottom: 12px; }
.score-box { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 6px 18px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
.score-box.gold { border-color: rgba(255,215,0,0.3); }
.score-label { font-size: 10px; color: #888; font-weight: 700; letter-spacing: 1px; }
.score-label.gold { color: #FFD700; }
.score-value { font-size: 22px; font-weight: 900; color: white; }
.score-value.gold { color: #FFD700; }
#combo-text { color: #FFD700; font-size: 14px; font-weight: 700; height: 20px; text-align: center; margin-bottom: 6px; }
#grid-wrap { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 6px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
#grid { display: grid; grid-template-columns: repeat(8, 44px); grid-template-rows: repeat(8, 44px); gap: 3px; }
.cell { width: 44px; height: 44px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; transition: background 0.1s; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.1} }
.cell.flash { animation: flash 0.4s ease; background: white !important; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.shake { animation: shake 0.4s ease; }
#tray { display: flex; gap: 16px; margin-top: 14px; background: rgba(255,255,255,0.06); border-radius: 20px; padding: 12px 20px; border: 1px solid rgba(255,255,255,0.1); }
.block-slot { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: grab; transition: opacity 0.2s; }
.block-slot.dragging { opacity: 0.3; }
.block-slot.used { opacity: 0; pointer-events: none; }
.mini-grid { display: grid; gap: 2px; }
.mini-cell { border-radius: 3px; }
#drag-ghost { position: fixed; pointer-events: none; z-index: 500; opacity: 0.85; display: none; }
.ghost-cell { border-radius: 7px; }
@keyframes comboIn { 0%{transform:translate(-50%,-50%) scale(0.5);opacity:0} 30%{transform:translate(-50%,-80%) scale(1.2);opacity:1} 70%{transform:translate(-50%,-100%) scale(1);opacity:1} 100%{transform:translate(-50%,-120%) scale(0.8);opacity:0} }
#combo-popup { position: fixed; pointer-events: none; z-index: 999; text-align: center; display: none; }
#combo-popup .line1 { font-size: 36px; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px #FF8C00; }
#combo-popup .line2 { font-size: 22px; color: #FF6B6B; }
#gameover { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; flex-direction: column; align-items: center; justify-content: center; }
@keyframes pop { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.3)} 100%{transform:scale(1);opacity:1} }
#gameover-box { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid rgba(255,215,0,0.3); border-radius: 24px; padding: 40px 50px; text-align: center; animation: pop 0.4s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
#gameover-box .go-title { font-size: 28px; font-weight: 900; color: #FF6B6B; margin-bottom: 6px; }
#gameover-box .go-sub { color: #aaa; font-size: 14px; margin-bottom: 16px; }
#gameover-box .go-score { font-size: 48px; font-weight: 900; color: #FFD700; margin-bottom: 4px; }
#gameover-box .go-best { color: #888; font-size: 13px; margin-bottom: 24px; }
#gameover-box button { background: linear-gradient(135deg, #FFD700, #FF8C00); border: none; border-radius: 14px; padding: 14px 40px; font-size: 18px; font-weight: 800; color: #1a1a2e; cursor: pointer; }
</style>
</head>
<body>
<div id="title">BLOCK BLAST</div>
<div id="scores">
  <div class="score-box"><div class="score-label">SCORE</div><div class="score-value" id="score-val">0</div></div>
  <div class="score-box gold"><div class="score-label gold">BEST</div><div class="score-value gold" id="best-val">0</div></div>
</div>
<div id="combo-text"></div>
<div id="grid-wrap"><div id="grid"></div></div>
<div id="tray"></div>
<div id="drag-ghost"></div>
<div id="combo-popup"><div class="line1" id="cp-line1"></div><div class="line2" id="cp-line2"></div></div>
<div id="gameover">
  <div id="gameover-box">
    <div class="go-title">Game Over</div>
    <div class="go-sub">No more moves!</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-best" id="go-best">Best: 0</div>
    <button onclick="resetGame()">Play Again</button>
  </div>
</div>
<script>
var GS=8,CS=44,GAP=3;
var SHAPES=[
  {s:[[1]],c:"#FF6B6B"},{s:[[1,1]],c:"#4ECDC4"},{s:[[1],[1]],c:"#4ECDC4"},
  {s:[[1,1,1]],c:"#45B7D1"},{s:[[1],[1],[1]],c:"#96CEB4"},{s:[[1,1],[1,1]],c:"#FFEAA7"},
  {s:[[1,0],[1,0],[1,1]],c:"#DDA0DD"},{s:[[0,1],[0,1],[1,1]],c:"#98FB98"},
  {s:[[1,1,1],[0,1,0]],c:"#F0A500"},{s:[[0,1,1],[1,1,0]],c:"#FF8C94"},
  {s:[[1,1,0],[0,1,1]],c:"#A8E6CF"},{s:[[1,1,1,1]],c:"#FFD93D"},
  {s:[[1],[1],[1],[1]],c:"#6BCB77"},{s:[[1,1,1],[1,1,1],[1,1,1]],c:"#C77DFF"},
  {s:[[1,1],[1,1],[1,1]],c:"#4CC9F0"},{s:[[1,1,1],[1,1,1]],c:"#F77F00"}
];
var grid,blocks,score,best,combo;
var dragging=-1,dragBlock=null,hoverR=null,hoverC=null;
best=parseInt(localStorage.getItem("bb_best")||"0");
document.getElementById("best-val").textContent=best;

function randomBlock(){var t=SHAPES[Math.floor(Math.random()*SHAPES.length)];return{shape:t.s,color:t.c};}
function initGrid(){grid=[];for(var r=0;r<GS;r++){grid.push([]);for(var c=0;c<GS;c++)grid[r].push(null);}}

function canPlace(shape,row,col){
for(var r=0;r<shape.length;r++)for(var c=0;c<shape[r].length;c++){
if(!shape[r][c])continue;
var nr=row+r,nc=col+c;
if(nr<0||nr>=GS||nc<0||nc>=GS||grid[nr][nc])return false;
}
return true;
}

function hasAnyMove(){
for(var i=0;i<blocks.length;i++){
if(!blocks[i])continue;
for(var r=0;r<GS;r++)for(var c=0;c<GS;c++)if(canPlace(blocks[i].shape,r,c))return true;
}
return false;
}

function renderGrid(){
var el=document.getElementById(“grid”);el.innerHTML=””;
for(var r=0;r<GS;r++)for(var c=0;c<GS;c++){
var cell=document.createElement(“div”);cell.className=“cell”;cell.id=“c”+r+”-”+c;
if(grid[r][c]){cell.style.background=grid[r][c];cell.style.border=“2px solid “+grid[r][c]+“cc”;}
el.appendChild(cell);
}
}

function clearGhost(){
for(var r=0;r<GS;r++)for(var c=0;c<GS;c++){
var cell=document.getElementById(“c”+r+”-”+c);
if(!cell||grid[r][c])continue;
cell.style.background=“rgba(255,255,255,0.06)”;cell.style.border=“2px solid rgba(255,255,255,0.05)”;
}
}

function renderGhost(){
clearGhost();
if(dragging<0||hoverR===null||!dragBlock)return;
var valid=canPlace(dragBlock.shape,hoverR,hoverC);
for(var r=0;r<dragBlock.shape.length;r++)for(var c=0;c<dragBlock.shape[r].length;c++){
if(!dragBlock.shape[r][c])continue;
var nr=hoverR+r,nc=hoverC+c;
if(nr<0||nr>=GS||nc<0||nc>=GS)continue;
var cell=document.getElementById(“c”+nr+”-”+nc);
if(!cell||grid[nr][nc])continue;
if(valid){cell.style.background=dragBlock.color+“88”;cell.style.border=“2px solid “+dragBlock.color;}
else{cell.style.background=“rgba(255,60,60,0.3)”;cell.style.border=“2px solid rgba(255,60,60,0.5)”;}
}
}

function renderTray(){
var tray=document.getElementById(“tray”);tray.innerHTML=””;
for(var i=0;i<3;i++){
var slot=document.createElement(“div”);
slot.className=“block-slot”+(!blocks[i]?” used”:””);slot.dataset.idx=i;
if(blocks[i]){
var b=blocks[i],rows=b.shape.length,cols=b.shape[0].length;
var cs=Math.min(20,Math.floor(70/Math.max(rows,cols)));
var mg=document.createElement(“div”);mg.className=“mini-grid”;
mg.style.gridTemplateColumns=“repeat(”+cols+”, “+cs+“px)”;mg.style.gridTemplateRows=“repeat(”+rows+”, “+cs+“px)”;mg.style.gap=“2px”;
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var bc=document.createElement(“div”);bc.className=“mini-cell”;
bc.style.width=cs+“px”;bc.style.height=cs+“px”;bc.style.background=b.shape[r][c]?b.color:“transparent”;
mg.appendChild(bc);
}
slot.appendChild(mg);
(function(idx){
slot.addEventListener(“mousedown”,function(e){startDrag(idx,e.clientX,e.clientY);});
slot.addEventListener(“touchstart”,function(e){e.preventDefault();startDrag(idx,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
})(i);
}
tray.appendChild(slot);
}
}

var GCS=40;
function buildGhost(block){
var ghost=document.getElementById(“drag-ghost”);ghost.innerHTML=””;
var rows=block.shape.length,cols=block.shape[0].length;
var mg=document.createElement(“div”);mg.style.display=“grid”;
mg.style.gridTemplateColumns=“repeat(”+cols+”, “+GCS+“px)”;mg.style.gridTemplateRows=“repeat(”+rows+”, “+GCS+“px)”;mg.style.gap=“3px”;
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var bc=document.createElement(“div”);bc.className=“ghost-cell”;
bc.style.width=GCS+“px”;bc.style.height=GCS+“px”;
bc.style.background=block.shape[r][c]?block.color:“transparent”;
bc.style.border=block.shape[r][c]?“2px solid “+block.color+“cc”:“none”;
mg.appendChild(bc);
}
ghost.appendChild(mg);ghost.style.display=“block”;
}

function posGhost(cx,cy){
if(!dragBlock)return;
var cols=dragBlock.shape[0].length,rows=dragBlock.shape.length;
var w=cols*GCS+(cols-1)*3,h=rows*GCS+(rows-1)*3;
var g=document.getElementById(“drag-ghost”);
g.style.left=(cx-w/2)+“px”;g.style.top=(cy-h/2-50)+“px”;
}

function getAnchor(cx,cy){
var rect=document.getElementById(“grid”).getBoundingClientRect();
var cols=dragBlock.shape[0].length,rows=dragBlock.shape.length;
var bw=cols*CS+(cols-1)*GAP,bh=rows*CS+(rows-1)*GAP;
var rx=cx-rect.left-bw/2,ry=cy-rect.top-bh/2-50;
return{row:Math.round(ry/(CS+GAP)),col:Math.round(rx/(CS+GAP))};
}

function startDrag(idx,cx,cy){
if(!blocks[idx])return;
dragging=idx;dragBlock=blocks[idx];
var sl=document.querySelector(”.block-slot[data-idx=’”+idx+”’]”);if(sl)sl.classList.add(“dragging”);
buildGhost(dragBlock);posGhost(cx,cy);
var a=getAnchor(cx,cy);hoverR=a.row;hoverC=a.col;renderGhost();
}

window.addEventListener(“mousemove”,function(e){
if(dragging<0)return;posGhost(e.clientX,e.clientY);
var a=getAnchor(e.clientX,e.clientY);hoverR=a.row;hoverC=a.col;renderGhost();
});
window.addEventListener(“touchmove”,function(e){
if(dragging<0)return;e.preventDefault();
var t=e.touches[0];posGhost(t.clientX,t.clientY);
var a=getAnchor(t.clientX,t.clientY);hoverR=a.row;hoverC=a.col;renderGhost();
},{passive:false});
window.addEventListener(“mouseup”,function(e){if(dragging>=0)drop(e.clientX,e.clientY);});
window.addEventListener(“touchend”,function(e){if(dragging>=0)drop(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});

function drop(cx,cy){
document.getElementById(“drag-ghost”).style.display=“none”;
var sl=document.querySelector(”.block-slot[data-idx=’”+dragging+”’]”);if(sl)sl.classList.remove(“dragging”);
var a=getAnchor(cx,cy);hoverR=a.row;hoverC=a.col;
if(!canPlace(dragBlock.shape,hoverR,hoverC)){
dragging=-1;dragBlock=null;hoverR=null;hoverC=null;clearGhost();
var w=document.getElementById(“grid-wrap”);w.classList.add(“shake”);setTimeout(function(){w.classList.remove(“shake”);},400);
return;
}
for(var r=0;r<dragBlock.shape.length;r++)for(var c=0;c<dragBlock.shape[r].length;c++)if(dragBlock.shape[r][c])grid[hoverR+r][hoverC+c]=dragBlock.color;
var bc=0;for(var r=0;r<dragBlock.shape.length;r++)for(var c=0;c<dragBlock.shape[r].length;c++)if(dragBlock.shape[r][c])bc++;
var idx=dragging;dragging=-1;dragBlock=null;hoverR=null;hoverC=null;
var cleared=clearLines();
combo=cleared>0?combo+1:0;
var ls=cleared*18+(cleared>1?cleared*(cleared-1)*10:0);
var cb=combo>1?combo*20:0;
score+=bc+ls+cb;
if(score>best){best=score;localStorage.setItem(“bb_best”,best);}
document.getElementById(“score-val”).textContent=score;
document.getElementById(“best-val”).textContent=best;
document.getElementById(“combo-text”).textContent=combo>1?“COMBO x”+combo+”!”:””;
if(cleared>0)showComboPopup(cleared,combo);
blocks[idx]=null;
if(blocks.every(function(b){return b===null;}))blocks=[randomBlock(),randomBlock(),randomBlock()];
renderGrid();renderTray();clearGhost();
setTimeout(function(){if(!hasAnyMove())showGameOver();},50);
}

function clearLines(){
var rc=[],cc=[];
for(var r=0;r<GS;r++)if(grid[r].every(function(c){return c;}))rc.push(r);
for(var c=0;c<GS;c++)if(grid.every(function(row){return row[c];}))cc.push(c);
if(!rc.length&&!cc.length)return 0;
var fs={};
rc.forEach(function(r){for(var c=0;c<GS;c++)fs[“c”+r+”-”+c]=1;});
cc.forEach(function(c){for(var r=0;r<GS;r++)fs[“c”+r+”-”+c]=1;});
Object.keys(fs).forEach(function(id){var el=document.getElementById(id);if(el){el.classList.add(“flash”);setTimeout(function(){el.classList.remove(“flash”);},400);}});
rc.forEach(function(r){for(var c=0;c<GS;c++)grid[r][c]=null;});
cc.forEach(function(c){for(var r=0;r<GS;r++)grid[r][c]=null;});
return rc.length+cc.length;
}

function showComboPopup(lines,c){
var p=document.getElementById(“combo-popup”);
p.style.display=“block”;p.style.left=“50%”;p.style.top=“40%”;
p.style.animation=“none”;p.offsetHeight;p.style.animation=“comboIn 0.9s ease forwards”;
document.getElementById(“cp-line1”).textContent=lines>1?lines+” LINES!”:“CLEAR!”;
document.getElementById(“cp-line2”).textContent=c>1?“COMBO x”+c:””;
setTimeout(function(){p.style.display=“none”;},900);
}

function showGameOver(){
document.getElementById(“go-score”).textContent=score;
document.getElementById(“go-best”).textContent=“Best: “+best;
document.getElementById(“gameover”).style.display=“flex”;
}

function resetGame(){
document.getElementById(“gameover”).style.display=“none”;
score=0;combo=0;
document.getElementById(“score-val”).textContent=0;
document.getElementById(“combo-text”).textContent=””;
initGrid();blocks=[randomBlock(),randomBlock(),randomBlock()];
renderGrid();renderTray();
}

resetGame();
</script>

</body>
</html>
